

<!DOCTYPE html>
<html amp lang="id">
<head>
<meta charset="utf-8">
<script async src="https://cdn.ampproject.org/v0.js"></script>
<script async custom-element="amp-accordion" src="https://cdn.ampproject.org/v0/amp-accordion-0.1.js"></script>
<title>${titleFinal}</title>
<link rel="canonical" href="${canonicalUrl}">
<link rel="amphtml" href="${pagesUrl}/" />
<link rel="alternate" hreflang="id-id" href="${pagesUrl}/">
<link rel="alternate" hreflang="x-default" href="${pagesUrl}/">
<link rel="alternate" hreflang="id" href="${pagesUrl}/">
<link rel="alternate" href="${pagesUrl}/">
<link rel="alternate" hreflang="en" href="${pagesUrl}/">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1">
<meta name="theme-color" content="#0b0000">
<meta name="robots" content="index,follow">
<meta name="description" content="${descFinal}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@700&display=swap">
<link rel="icon" type="image/png" href="${pagesUrl}/assets/img/favicon.webp">

<!-- Open Graph -->
<meta property="og:title" content="${titleFinal}">
<meta property="og:description" content="${descFinal}">
<meta property="og:image" content="${pagesUrl}/assets/astro/banner.CnP7kgaE_2qrlDw-optimized.webp">
<meta property="og:url" content="${pagesUrl}/">
<meta property="og:type" content="website">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="${titleFinal}">
<meta name="twitter:description" content="${descFinal}">
<meta name="twitter:image" content="${pagesUrl}/assets/astro/banner.CnP7kgaE_2qrlDw-optimized.webp">

<!-- Schema.org JSON-LD -->
<script type="application/ld+json">
{"@context": "https://schema.org", "@graph": [{"@type": "Article", "@id": "${pagesUrl}/#article", "headline": "${titleFinal}", "description": "${descFinal}", "image": {"@type": "ImageObject", "url": "${pagesUrl}/assets/astro/banner.CnP7kgaE_2qrlDw-optimized.webp", "width": 560, "height": 500}, "datePublished": "${datePublished}", "dateModified": "${dateModified}", "author": {"@type": "Person", "name": "${keyword}", "url": "${pagesUrl}"}, "publisher": {"@type": "Organization", "name": "${keyword}", "logo": {"@type": "ImageObject", "url": "${logoUrl}", "width": 160, "height": 44}}, "mainEntityOfPage": {"@type": "WebPage", "@id": "${pagesUrl}"}}, {"@type": "WebSite", "@id": "${pagesUrl}#website", "url": "${pagesUrl}", "name": "${keyword}"}]}
</script>

<style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>

<style amp-custom>
:root {
  --bg: #0b0000;
  --text: #fff;
  --accent: #ff2a2a;
  --accent-glow: rgba(255, 42, 42, 0.15);
  --card: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 42, 42, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh;
  line-height: 1.6;
}

.wrap { max-width: 560px; margin: 0 auto; padding: 12px; }

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

.banner-link {
  display: block;
  width: 100%;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 12px;
  border: 1.5px solid rgba(255, 42, 42, 0.27);
}

.brand-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 12px;
}

.brand-row amp-img {
  border-radius: 6px;
}

.brand-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
}

.badge-card {
  background: rgba(11, 0, 0, 0.8);
  border: 1px solid rgba(255, 42, 42, 0.2);
  border-radius: 16px;
  padding: 10px 12px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.badge-vip {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255, 42, 42, 0.13);
  border: 1.5px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.badge-vip span {
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  color: var(--accent);
  font-weight: 700;
}

.badge-info { flex: 1; }

.badge-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}

.badge-sub {
  font-size: 11px;
  color: var(--accent);
}

.badge-join {
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid var(--accent);
  border-radius: 8px;
  padding: 8px 14px;
  text-align: center;
}

.badge-join span {
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  color: var(--accent);
  font-weight: 700;
}

.cta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.btn-primary, .btn-outline {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 52px;
  border-radius: 14px;
  text-decoration: none;
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  animation: pulse 2.5s ease-in-out infinite;
}

.btn-outline {
  background: transparent;
  border: 2px solid var(--accent);
  color: var(--accent);
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.stat-card {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 42, 42, 0.13);
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}

.stat-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 2px;
}

.stat-lbl {
  font-size: 10px;
  color: #aaa;
}

.kw-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 48px;
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid var(--accent);
  border-radius: 14px;
  margin-bottom: 10px;
  text-decoration: none;
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 1px;
}

.pay-strip {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 42, 42, 0.13);
  border-radius: 10px;
  padding: 8px;
  margin-bottom: 12px;
  text-align: center;
}

.pay-lbl { font-size: 10px; color: #888; }
.pay-val { color: var(--accent); }

.footer {
  text-align: center;
  padding: 12px 0;
  border-top: 1px solid rgba(255, 42, 42, 0.07);
}

.footer p { font-size: 10px; color: #555; }
.footer span { color: var(--accent); }

/* Accordion tweaks */
amp-accordion section {
  border-top: 1px solid rgba(255, 42, 42, 0.13);
  margin-top: 12px;
  padding-top: 10px;
}

amp-accordion section > h2 {
  cursor: pointer;
  background-color: black;
  padding-right: 20px;
  border: 1px solid #dfdfdf;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  border-radius: 8px;
}

amp-accordion [expanded] h2::after { content: "−"; }
amp-accordion h2::after {
  content: "+";
  font-size: 16px;
}

amp-accordion div[role="region"] {
  font-size: 12px;
  color: #ccc;
  padding-top: 8px;
  line-height: 1.7;
  text-align: justify;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.78; }
}
</style>
</head>
<body class="amp-dark-mode">

<h1 class="sr-only">${titleFinal}</h1>

<div class="wrap">

  <div class="brand-row">
    <amp-img src="${logoUrl}" alt="${keyword} logo" width="32" height="32" layout="fixed"></amp-img>
    <span class="brand-name">${keyword}</span>
  </div>

  <a href="${ctaUrl}" target="_blank" rel="noopener noreferrer" class="banner-link">
    <amp-img src="${pagesUrl}/assets/astro/banner.CnP7kgaE_2qrlDw-optimized.webp" alt="${keyword} - Promo Spesial" width="560" height="500" layout="responsive"></amp-img>
  </a>

  <div class="badge-card">
    <div class="badge-vip"><span>VIP</span></div>
    <div class="badge-info">
      <p class="badge-name">${keyword}</p>
      <p class="badge-sub">Brand unggulan</p>
    </div>
    <div class="badge-join"><span>JOIN</span></div>
  </div>

  <div class="cta-grid">
    <a href="${ctaUrl}" target="_blank" rel="noopener noreferrer" class="btn-primary"><span>LOGIN</span></a>
    <a href="${ctaUrl}" target="_blank" rel="noopener noreferrer" class="btn-outline"><span>DAFTAR</span></a>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val">19</div>
      <div class="stat-lbl">Provider</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">10 RIBU</div>
      <div class="stat-lbl">Min Deposit</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">98%</div>
      <div class="stat-lbl">RTP Live</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">RP 25RB</div>
      <div class="stat-lbl">Min WD</div>
    </div>
  </div>

  <a href="${ctaUrl}" target="_blank" rel="noopener noreferrer" class="kw-btn"><span>${keyword}</span></a>

  <div class="pay-strip">
    <p class="pay-lbl">Metode: <span class="pay-val">QRIS | Ewallet | VA</span></p>
  </div>

  <!-- Info lengkap - collapsed default, expand on click (AMP-valid) -->
  <amp-accordion>
    <section>
      <h2>Info Lengkap ${keyword}</h2>
      <div>
        ${cleanArtikel}
      </div>
    </section>
  </amp-accordion>

  <div class="footer">
    <p>&copy; <span>${keyword}</span> ${footerYear}</p>
  </div>

</div>

</body>
</html>
